<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="description" content="NUVA Journal - A minimalist publication for timeless ideas">
    <meta name="author" content="MUYANJA ANDREW">
    <meta property="og:title" content="NUVA Journal | Thoughts on Education">
    <meta property="og:type" content="website">
    <title>NUVA • Journal — Cloud Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #000080; overflow-x: hidden; }
        .heading-font { font-family: 'Playfair Display', serif; }
        .nuva-logo {
            width: 48px; height: 48px; border-radius: 50%;
            background: conic-gradient(from 200deg, #fe4f04, #ff7a2d 90deg, #9b6aff);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; color: white;
        }
        .post-card {
            transition: transform 0.25s, box-shadow 0.3s;
            cursor: pointer;
        }
        .post-card:hover { transform: translateY(-6px); box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15); }
        .modal { animation: modalPop 0.2s ease-out; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
        .rich-text { line-height: 1.75; }
        .rich-text img, .rich-text video, .rich-text iframe { max-width: 100%; border-radius: 1rem; margin: 1.5rem 0; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 1rem; background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .loading-spinner { border: 3px solid rgba(0,0,128,0.1); border-top: 3px solid #fe4f04; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .sync-status { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); padding: 6px 14px; border-radius: 40px; font-size: 11px; z-index: 1000; border-left: 3px solid #10b981; pointer-events: none; }
        .content-badge { position: absolute; top: 0.85rem; left: 0.85rem; background: rgba(0,0,0,0.65); backdrop-filter: blur(8px); padding: 0.3rem 0.85rem; border-radius: 40px; font-size: 0.7rem; z-index: 10; }
        .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.75rem; }
        @media (max-width: 700px) { .posts-grid { grid-template-columns: 1fr; } }
        .comment-avatar { background: linear-gradient(135deg, #fe4f04, #ff7a2d); }
        .online-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #10b981; margin-right: 6px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{ opacity: 1; } 50%{ opacity: 0.5; } }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/85 backdrop-blur-xl border-b shadow-sm">
        <div class="max-w-7xl mx-auto px-5 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="nuva-logo"><span class="text-sm">NUVA</span></div>
                <div><span class="heading-font text-2xl font-bold">NUVA</span><span class="text-[0.55rem] tracking-[2px] text-gray-500 block -mt-1">JOURNAL</span></div>
            </div>
            <div class="flex items-center gap-5 text-xs font-medium">
                <a href="#" onclick="scrollToPosts(event)" class="hover:text-[#fe4f04]">JOURNAL</a>
                <a href="#" onclick="showAboutModal(event)" class="hover:text-[#fe4f04]">ABOUT</a>
                <a href="blogadmin.html" target="_blank" class="text-[#fe4f04]"><i class="fa-solid fa-lock"></i> ADMIN</a>
            </div>
            <button onclick="refreshPosts()" class="p-2 hover:bg-gray-100 rounded-full"><i class="fa-solid fa-sync-alt"></i></button>
        </div>
    </nav>

    <div class="pt-20">
        <!-- HERO -->
        <div class="relative min-h-[70vh] flex items-center justify-center text-center px-5 bg-[radial-gradient(rgba(0,0,128,0.05)_1px,transparent_1px)]">
            <div>
                <div class="inline-flex items-center gap-2 bg-white/30 backdrop-blur-md px-5 py-2 rounded-full text-[0.65rem] mb-6"><div class="w-1.5 h-1.5 bg-[#fe4f04] rounded-full animate-pulse"></div><span>CLOUD SYNCED</span></div>
                <h1 class="heading-font text-5xl sm:text-7xl md:text-8xl font-bold tracking-tighter">THOUGHTS.<br>UNFILTERED.</h1>
                <p class="text-base sm:text-xl text-[#000066] max-w-md mx-auto mt-5 mb-8">A minimalist journal of ideas.</p>
                <button onclick="scrollToPosts(event)" class="px-8 py-4 bg-[#000080] text-white rounded-2xl hover:bg-[#fe4f04] transition">BEGIN READING <i class="fa-solid fa-arrow-down"></i></button>
            </div>
        </div>

        <!-- POSTS SECTION -->
        <div id="posts-section" class="max-w-7xl mx-auto px-5 py-16 sm:py-24">
            <div class="flex justify-between items-end mb-10">
                <div><span class="text-[0.65rem] uppercase tracking-[2px] text-gray-500">Latest Entries</span><h2 class="heading-font text-4xl sm:text-5xl">The Journal</h2></div>
                <div class="text-xs text-gray-500" id="post-count-display"><span class="online-dot"></span> Loading...</div>
            </div>
            <div id="loading-spinner" class="flex justify-center py-20"><div class="loading-spinner"></div></div>
            <div id="posts-grid" class="posts-grid hidden"></div>
            <div id="empty-state" class="hidden text-center py-20"><i class="fa-regular fa-newspaper text-6xl text-gray-400 mb-4"></i><p>No entries yet.</p></div>
        </div>

        <footer class="bg-white border-t py-12 text-center text-[0.6rem] text-gray-500">© 2026 NUVA JOURNAL</footer>
    </div>

    <!-- POST MODAL -->
    <div id="post-modal" onclick="if(event.target===this) closeModal()" class="hidden fixed inset-0 bg-white/95 backdrop-blur-xl items-center justify-center z-[9999] p-3 overflow-auto">
        <div onclick="event.stopPropagation()" class="modal bg-white shadow-2xl w-full max-w-4xl max-h-[95vh] overflow-y-auto rounded-2xl relative">
            <div id="modal-media" class="relative w-full bg-cover bg-center" style="min-height: 200px;"><button onclick="closeModal()" class="absolute top-4 right-4 bg-white/90 border w-9 h-9 rounded-xl z-30"><i class="fa-solid fa-times"></i></button></div>
            <div class="px-5 sm:px-10 pb-8">
                <div id="modal-date" class="text-[0.7rem] text-gray-500 mt-5 mb-2"></div>
                <h1 id="modal-title" class="heading-font text-3xl sm:text-5xl"></h1>
                <div id="modal-content" class="rich-text mt-8"></div>
                <div class="mt-12 border-t pt-8">
                    <h3 class="text-lg font-semibold mb-4"><i class="fa-solid fa-message text-[#fe4f04]"></i> CONVERSATIONS <span id="comment-count"></span></h3>
                    <div id="comments-list" class="space-y-6 mb-8 max-h-80 overflow-y-auto"></div>
                    <div class="bg-gray-50 rounded-2xl p-5">
                        <div class="grid sm:grid-cols-2 gap-4"><input id="comment-name" placeholder="Your name *" class="border rounded-xl px-4 py-2"><input id="comment-email" placeholder="Email" class="border rounded-xl px-4 py-2"></div>
                        <textarea id="comment-text" rows="2" placeholder="Share your thoughts..." class="mt-3 w-full border rounded-xl px-4 py-2"></textarea>
                        <button onclick="submitComment()" class="mt-4 px-6 py-2 bg-[#000080] text-white rounded-xl hover:bg-[#fe4f04] transition">POST COMMENT</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="sync-status" class="sync-status"><i class="fa-solid fa-cloud-check mr-1"></i><span>Connecting...</span></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTF6CR_KPF2Sh8hmp8Xkn6SGFBV3_InyI",
            authDomain: "nuva-blog.firebaseapp.com",
            projectId: "nuva-blog",
            storageBucket: "nuva-blog.firebasestorage.app",
            messagingSenderId: "1097706865856",
            appId: "1:1097706865856:web:70b95936db33aa7dc99925"
        };

        let db = null;
        let useCloud = false;
        let posts = [];
        let currentPostId = null;
        let unsubscribeRealtime = null;

        function initFirebase() {
            try {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                useCloud = true;
                updateSyncStatus("Connected", "success");
                return true;
            } catch(e) { useCloud = false; updateSyncStatus("Offline", "error"); return false; }
        }

        function setupRealtimeListener() {
            if (!useCloud || !db) { loadFromLocalStorage(); return; }
            updateSyncStatus("Syncing...", "syncing");
            unsubscribeRealtime = db.collection('posts').orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
                posts = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    posts.push({ id: parseInt(doc.id) || doc.id, ...data, comments: data.comments || [], mediaBlocks: data.mediaBlocks || [] });
                });
                localStorage.setItem('nuvaPosts', JSON.stringify(posts));
                renderPostsGrid();
                updateSyncStatus(`Live (${posts.length} posts)`, "success");
                if (currentPostId) { const updated = posts.find(p => p.id == currentPostId); if (updated) refreshOpenModal(updated); }
            }, (error) => { console.error(error); loadFromLocalStorage(); });
        }

        function loadFromLocalStorage() { const saved = localStorage.getItem('nuvaPosts'); posts = saved ? JSON.parse(saved) : []; renderPostsGrid(); }

        function renderPostsGrid() {
            const container = document.getElementById('posts-grid');
            const loading = document.getElementById('loading-spinner');
            const emptyState = document.getElementById('empty-state');
            if (!container) return;
            loading.classList.add('hidden');
            if (!posts || posts.length === 0) { container.classList.add('hidden'); emptyState.classList.remove('hidden'); document.getElementById('post-count-display').innerHTML = `<span class="online-dot"></span> 0 entries`; return; }
            container.classList.remove('hidden'); emptyState.classList.add('hidden'); container.innerHTML = '';
            document.getElementById('post-count-display').innerHTML = `<span class="online-dot"></span> ${posts.length} entry${posts.length !== 1 ? 's' : ''}`;
            
            posts.forEach(post => {
                let mediaPreview = ''; let contentType = 'text'; let badgeIcon = 'fa-quote-right';
                let firstMedia = (post.mediaBlocks && post.mediaBlocks.length) ? post.mediaBlocks[0] : null;
                if (firstMedia) {
                    if (firstMedia.type === 'image') { contentType = 'image'; badgeIcon = 'fa-image'; mediaPreview = `<div class="h-52 sm:h-64 bg-cover bg-center" style="background-image: url('${escapeHtml(firstMedia.url)}'); background-size: cover;"></div>`; }
                    else if (firstMedia.type === 'video') { contentType = 'video'; badgeIcon = 'fa-video'; mediaPreview = `<div class="h-52 sm:h-64 bg-black flex items-center justify-center"><i class="fa-solid fa-play-circle text-5xl text-white/80"></i></div>`; }
                    else if (firstMedia.type === 'embed') { contentType = 'embed'; badgeIcon = 'fa-code'; mediaPreview = `<div class="h-52 sm:h-64 bg-gray-100 flex items-center justify-center"><i class="fa-solid fa-link text-3xl text-gray-500"></i></div>`; }
                } else { mediaPreview = `<div class="h-52 sm:h-64 bg-gradient-to-br from-gray-50 to-gray-200 flex items-center justify-center"><i class="fa-regular fa-file-lines text-5xl text-gray-400"></i></div>`; }
                
                const card = document.createElement('div');
                card.className = 'post-card bg-white shadow-md border rounded-2xl overflow-hidden group';
                card.innerHTML = `<div class="relative overflow-hidden">${mediaPreview}<div class="content-badge"><i class="fa-solid ${badgeIcon} text-[#fe4f04] text-xs mr-1"></i><span class="text-white text-xs">${contentType.toUpperCase()}</span></div></div>
                <div class="p-5"><div class="text-[0.6rem] text-gray-500 mb-1">${post.date || 'Recent'}</div><h3 class="heading-font text-2xl tracking-tighter mb-2 group-hover:text-[#fe4f04] transition">${escapeHtml(post.title)}</h3><p class="text-sm text-gray-500 line-clamp-3">${escapeHtml(post.excerpt)}</p><div class="mt-4 text-xs text-gray-500"><i class="fa-regular fa-comment"></i> ${post.comments?.length || 0}</div></div>`;
                card.onclick = () => openPostModal(post.id);
                container.appendChild(card);
            });
        }

        function openPostModal(id) {
            const post = posts.find(p => p.id == id);
            if (!post) return;
            currentPostId = id;
            renderModalContent(post);
            document.getElementById('post-modal').classList.remove('hidden');
            document.getElementById('post-modal').classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function renderModalContent(post) {
            const modalMediaDiv = document.getElementById('modal-media');
            let mediaHtml = `<button onclick="closeModal()" class="absolute top-4 right-4 bg-white/90 border w-9 h-9 rounded-xl z-30"><i class="fa-solid fa-times"></i></button>`;
            
            if (post.mediaBlocks && post.mediaBlocks.length > 0) {
                const first = post.mediaBlocks[0];
                if (first.type === 'image') {
                    modalMediaDiv.style.backgroundImage = `url('${first.url}')`;
                    modalMediaDiv.style.backgroundSize = 'cover';
                    modalMediaDiv.style.backgroundPosition = 'center';
                    modalMediaDiv.style.minHeight = '280px';
                    modalMediaDiv.innerHTML = mediaHtml;
                } else if (first.type === 'video') {
                    modalMediaDiv.style.backgroundImage = 'none';
                    modalMediaDiv.style.backgroundColor = '#000';
                    modalMediaDiv.style.minHeight = '280px';
                    modalMediaDiv.innerHTML = `<video controls class="w-full max-h-72" src="${first.url}"></video>` + mediaHtml;
                } else if (first.type === 'embed') {
                    modalMediaDiv.style.backgroundImage = 'none';
                    modalMediaDiv.style.minHeight = '280px';
                    modalMediaDiv.innerHTML = `<div class="w-full h-full">${first.embedCode || `<iframe src="${first.url}" class="w-full h-64" frameborder="0" allowfullscreen></iframe>`}</div>` + mediaHtml;
                }
            } else { modalMediaDiv.style.backgroundImage = 'none'; modalMediaDiv.style.minHeight = 'auto'; modalMediaDiv.innerHTML = mediaHtml; }
            
            document.getElementById('modal-date').innerText = post.date || 'Recent';
            document.getElementById('modal-title').innerText = post.title;
            let fullContent = '';
            if (post.mediaBlocks) {
                post.mediaBlocks.forEach(block => {
                    if (block.type === 'image') fullContent += `<img src="${block.url}" class="rounded-xl my-3 max-w-full">`;
                    else if (block.type === 'video') fullContent += `<video controls class="rounded-xl my-3 w-full" src="${block.url}"></video>`;
                    else if (block.type === 'embed') fullContent += `<div class="my-3">${block.embedCode || `<iframe src="${block.url}" width="100%" height="400" frameborder="0" allowfullscreen></iframe>`}</div>`;
                });
            }
            fullContent += post.content || '';
            document.getElementById('modal-content').innerHTML = fullContent;
            renderCommentsForModal(post);
        }

        function refreshOpenModal(post) { renderModalContent(post); }
        function renderCommentsForModal(post) {
            const container = document.getElementById('comments-list');
            const countSpan = document.getElementById('comment-count');
            const comments = post.comments || [];
            countSpan.innerText = `(${comments.length})`;
            if (!comments.length) { container.innerHTML = '<div class="text-center py-6 text-gray-400">No comments yet.</div>'; return; }
            container.innerHTML = '';
            comments.forEach(c => {
                const div = document.createElement('div');
                div.className = 'flex gap-3';
                div.innerHTML = `<div class="comment-avatar w-8 h-8 rounded-xl flex items-center justify-center text-white text-xs font-bold">${(c.name?.[0] || '?').toUpperCase()}</div>
                <div><div class="flex gap-2"><span class="font-medium text-sm">${escapeHtml(c.name)}</span><span class="text-[0.6rem] text-gray-400">${c.date || 'recent'}</span></div><p class="text-sm text-gray-700 mt-1">${escapeHtml(c.text)}</p></div>`;
                container.appendChild(div);
            });
        }

        async function submitComment() {
            const name = document.getElementById('comment-name').value.trim();
            const text = document.getElementById('comment-text').value.trim();
            if (!name || !text) { alert("Enter name and comment"); return; }
            const comment = { name, text, date: new Date().toLocaleString(), timestamp: Date.now() };
            if (useCloud && db) {
                try {
                    const postRef = db.collection('posts').doc(currentPostId.toString());
                    const docSnap = await postRef.get();
                    const existing = docSnap.exists ? (docSnap.data().comments || []) : [];
                    existing.unshift(comment);
                    await postRef.update({ comments: existing });
                    updateSyncStatus("Comment added", "success");
                } catch(e) { console.error(e); fallbackLocalComment(comment); }
            } else { fallbackLocalComment(comment); }
            document.getElementById('comment-name').value = '';
            document.getElementById('comment-text').value = '';
        }

        function fallbackLocalComment(comment) {
            const post = posts.find(p => p.id == currentPostId);
            if (post) { if (!post.comments) post.comments = []; post.comments.unshift(comment); localStorage.setItem('nuvaPosts', JSON.stringify(posts)); renderCommentsForModal(post); }
        }

        function closeModal() { document.getElementById('post-modal').classList.add('hidden'); document.body.style.overflow = ''; currentPostId = null; }
        function refreshPosts() { if (unsubscribeRealtime) unsubscribeRealtime(); setupRealtimeListener(); }
        function scrollToPosts(e) { if(e) e.preventDefault(); document.getElementById('posts-section').scrollIntoView({ behavior: 'smooth' }); }
        function showAboutModal(e) { e?.preventDefault(); alert("NUVA Journal — Cloud Edition\n\nUpload images directly, real-time sync, and comments.\n\nCreated by Muyanja Andrew"); }
        function updateSyncStatus(msg, status) {
            const el = document.getElementById('sync-status'); if(!el) return;
            let icon = 'fa-cloud', borderColor = '#f59e0b';
            if(status === 'success') { icon = 'fa-cloud-check'; borderColor = '#10b981'; }
            else if(status === 'error') { icon = 'fa-cloud-slash'; borderColor = '#ef4444'; }
            el.innerHTML = `<i class="fa-solid ${icon} mr-1"></i><span>${msg}</span>`;
            el.style.borderLeftColor = borderColor;
        }
        function escapeHtml(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
        
        document.addEventListener('keydown', (e) => { if(e.key === "Escape") closeModal(); });
        window.onload = () => { initFirebase(); setupRealtimeListener(); };
    </script>
</body>
</html>
