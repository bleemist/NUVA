<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUVA - Login</title>
<style>
  body { 
    margin: 0; 
    height: 100vh; 
    display: flex; 
    flex-direction: column; 
    align-items: center;
    background: linear-gradient(135deg, #1e3c72, #2a5298); 
    font-family: Arial, sans-serif; 
    color: #fff;
  }
  .nuva-logo { 
    position: relative; 
    width: 100px; 
    height: 100px; 
    border-radius: 50%;
    background: conic-gradient(from 200deg,#6ad7ff,#5b9cff 90deg,#9b6aff); 
    display: flex; 
    align-items: center; 
    justify-content: center;
    overflow: hidden; 
    margin-top: 30px; 
    margin-bottom: 15px; 
  }
  .nuva-logo:after { 
    content: ""; 
    position: absolute; 
    width: 55px; 
    height: 55px; 
    border-radius: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.7), transparent); 
    transform: translateY(8px); 
    opacity: 0.15; 
  }
  .grid { 
    position: absolute;
    display: grid; 
    grid-template-columns: repeat(3,1fr); 
    gap: 6px; 
    justify-items: center; 
    align-items: center; 
    opacity: 0.25; 
  }
  .dot { 
    width: 12px; 
    height: 12px; 
    border-radius: 50%; 
    background: linear-gradient(180deg,#fff,#cfe8ff); 
  }
  .dot.center { 
    transform: scale(1.5); 
    background: linear-gradient(180deg,#6a11cb,#2575fc); 
  }
  .nuva-text { 
    font-size: 18px; 
    font-weight: 900; 
    letter-spacing: 1px; 
    color: #fff; 
    z-index: 1; 
  }
  h1 { 
    font-size: 48px; 
    margin: 5px 0 0 0; 
    text-shadow: 0 0 12px rgba(0,0,0,0.5); 
  }
  h2 { 
    font-size: 24px; 
    margin: 5px 0 15px 0; 
  }
  form { 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    width: 100%; 
    max-width: 400px; 
  }
  input {    
    width: 90%; 
    padding: 12px; 
    margin: 8px 0; 
    border: none; 
    border-radius: 8px; 
    font-size: 15px; 
  }
  input:focus { 
  outline: none; 
  box-shadow: 0 0 6px #00e6e6; 
  }
  button { 
    width: 200px; 
    padding: 14px; 
    margin-top: 25px; 
    border: none; 
    border-radius: 8px;
    background: linear-gradient(90deg, #fe4f04, #ff7a2d); 
    color: white; 
    font-size: 16px; 
    font-weight: bold; 
    cursor: pointer; 
    transition: 0.3s; 
  }
  button:hover {
     background: linear-gradient(90deg, #0033cc, #001a80); 
  }
  button:disabled {
     background: #cccccc; 
     cursor: not-allowed; 
  }
  .error-message { 
    color: #ff6666; 
    margin: 10px 0; 
    font-size: 14px; 
    display: none; 
    width: 90%; 
    text-align: center; 
  }
  .success-message { 
    color: #66ff66; 
    margin: 10px 0; 
    font-size: 14px; 
    display: none; 
    width: 90%; 
    text-align: center; 
  }
  .register-link { 
    margin-top: 20px; 
    color: #cfe8ff; 
    text-decoration: none; 
  }
  .register-link:hover { 
    text-decoration: underline; 
  }
  .forgot-password { 
    margin-top: 10px; 
    color: #cfe8ff; 
    text-decoration: none; 
    font-size: 14px; 
  }
  .forgot-password:hover { 
    text-decoration: underline; 
  }
</style>
</head>
<body>

<div class="nuva-logo">
  <div class="grid">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot center"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <div class="nuva-text">NUVA</div>
</div>

<h1>NUVA</h1>
<h2>Login to Your Account</h2>

<form id="loginForm">
  <input type="text" id="emailOrPhone" placeholder="Email or Phone Number" required>
  <input type="password" id="password" placeholder="Password" required>
  <div class="error-message" id="error-msg"></div>
  <div class="success-message" id="success-msg"></div>
  <button type="submit" id="submitBtn">Login</button>
</form>

<a href="index.html" class="register-link">Don't have an account? Create one</a>
<a href="#" class="forgot-password">Forgot your password?</a>

<script>
const loginForm = document.getElementById('loginForm');
const errorMsg = document.getElementById('error-msg');
const successMsg = document.getElementById('success-msg');
const submitBtn = document.getElementById('submitBtn');

loginForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    const formData = { emailOrPhone: document.getElementById('emailOrPhone').value.trim(), password: document.getElementById('password').value };
    if (!formData.emailOrPhone || !formData.password) { showError('Please enter both email/phone and password'); return; }
    submitBtn.disabled = true; submitBtn.textContent = 'Logging in...';
    try {
        const response = await fetch('/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(formData) });
        const result = await response.json();
        if (result.success) {
            showSuccess(result.message);
            sessionStorage.setItem('currentUser', JSON.stringify(result.user));
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
        } else { showError(result.error); }
    } catch (error) { showError('Network error. Please check your connection and try again.'); }
    finally { submitBtn.disabled = false; submitBtn.textContent = 'Login'; }
});

function showError(message) { errorMsg.textContent = message; errorMsg.style.display = message ? 'block' : 'none'; successMsg.style.display = 'none'; }
function showSuccess(message) { successMsg.textContent = message; successMsg.style.display = 'block'; errorMsg.style.display = 'none'; }
</script>
</body>
</html>
