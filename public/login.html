<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NUVA - Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #fe4f04;
      --primary-dark: #e03e00;
      --primary-light: #ff7a2d;
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --card-bg: rgba(15, 23, 42, 0.72);
      --card-border: rgba(254, 79, 4, 0.18);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --error: #f87171;
      --success: #34d399;
      --input-bg: rgba(30, 41, 59, 0.5);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      background: var(--bg-gradient);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .particle {
      position: absolute;
      background: rgba(254, 79, 4, 0.4);
      border-radius: 50%;
      animation: float linear infinite;
      box-shadow: 0 0 12px rgba(254, 79, 4, 0.6);
    }

    @keyframes float {
      0%   { transform: translateY(100vh) scale(0.5); opacity: 0; }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.8; }
      100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
    }

    .container {
      width: 100%;
      max-width: 480px;
      z-index: 10;
    }

    .logo-wrapper {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .nuva-logo {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: conic-gradient(from 200deg, #fe4f04, #ff7a2d 90deg, #9b6aff);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-family: 'Poppins', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: white;
      box-shadow: 0 10px 30px rgba(254, 79, 4, 0.45);
      animation: pulseGlow 4s infinite ease-in-out;
      position: relative;
      overflow: hidden;
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 10px 30px rgba(254, 79, 4, 0.45); }
      50%      { box-shadow: 0 15px 45px rgba(254, 79, 4, 0.65); }
    }

    .nuva-logo::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.35) 50%, transparent 60%);
      animation: shine 6s infinite;
    }

    @keyframes shine {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(120%); }
    }

    h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.5rem;
      background: linear-gradient(to right, #fe4f04, #ff7a2d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      font-size: 0.95rem;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border-radius: 20px;
      border: 1px solid var(--card-border);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      padding: 2.5rem 2rem;
      transition: transform 0.4s ease;
    }

    .card:hover {
      transform: translateY(-8px);
    }

    .form-group {
      margin-bottom: 1.8rem;
      position: relative;
    }

    label {
      position: absolute;
      top: 14px;
      left: 16px;
      font-size: 0.95rem;
      color: var(--text-muted);
      pointer-events: none;
      transition: all 0.25s ease;
    }

    input:focus + label,
    input:not(:placeholder-shown) + label {
      top: -10px;
      left: 12px;
      font-size: 0.75rem;
      color: var(--primary-light);
      background: var(--card-bg);
      padding: 0 6px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: rgba(30, 41, 59, 0.5);
      color: white;
      font-size: 1rem;
      transition: all 0.25s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(254, 79, 4, 0.15);
    }

    input.error {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.15);
    }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 1.8rem;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      color: white;
      font-size: 1.05rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 25px rgba(254, 79, 4, 0.35);
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.6s;
    }

    button:hover::before {
      left: 100%;
    }

    button:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(254, 79, 4, 0.5);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-message, .success-message {
      padding: 14px;
      margin: 1rem 0;
      border-radius: 12px;
      text-align: center;
      font-size: 0.95rem;
      display: none;
    }

    .error-message {
      background: rgba(248, 113, 113, 0.15);
      color: #f87171;
      border: 1px solid rgba(248, 113, 113, 0.3);
    }

    .success-message {
      background: rgba(52, 211, 153, 0.15);
      color: #34d399;
      border: 1px solid rgba(52, 211, 153, 0.3);
    }

    .footer-text {
      text-align: center;
      margin-top: 2rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .footer-text a {
      color: var(--primary-light);
      text-decoration: none;
      font-weight: 500;
    }

    .footer-text a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.5rem;
      }
      h1 {
        font-size: 1.9rem;
      }
    }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="container">
  <div class="logo-wrapper">
    <div class="nuva-logo">
      NUVA
      <div class="grid">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot center"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
    <h1>Login</h1>
    <p class="subtitle">Sign in to access your NUVA account</p>
  </div>

  <div class="card">
    <div class="error-message" id="error-msg"></div>
    <div class="success-message" id="success-msg"></div>

    <form id="loginForm">
      <div class="form-group">
        <input type="text" id="emailOrPhone" name="emailOrPhone" placeholder=" " required>
        <label for="emailOrPhone">Email or Phone Number</label>
      </div>

      <div class="form-group">
        <input type="password" id="password" name="password" placeholder=" " required>
        <label for="password">Password</label>
      </div>

      <button type="submit" id="submitBtn">Login</button>
    </form>

    <p class="footer-text">
      Don't have an account? <a href="/index.html">Create one</a>
    </p>
  </div>
</div>

<script>
// ────────────────────────────────────────────────
// Your original login logic (unchanged)
// ────────────────────────────────────────────────

const loginForm = document.getElementById('loginForm');
const submitBtn = document.getElementById('submitBtn');
const errorMsg = document.getElementById('error-msg');
const successMsg = document.getElementById('success-msg');

loginForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    const formData = { 
        emailOrPhone: document.getElementById('emailOrPhone').value.trim(), 
        password: document.getElementById('password').value 
    };
    if (!formData.emailOrPhone || !formData.password) { 
        showError('Please enter both email/phone and password'); 
        return; 
    }
    submitBtn.disabled = true; 
    submitBtn.textContent = 'Logging in...';
    try {
        const response = await fetch('/login', { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify(formData) 
        });
        const result = await response.json();
        if (result.success) {
            showSuccess(result.message);
            sessionStorage.setItem('currentUser', JSON.stringify(result.user));
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
        } else { 
            showError(result.error); 
        }
    } catch (error) { 
        showError('Network error. Please check your connection and try again.'); 
    }
    finally { 
        submitBtn.disabled = false; 
        submitBtn.textContent = 'Login'; 
    }
});

function showError(message) { 
    errorMsg.textContent = message; 
    errorMsg.style.display = message ? 'block' : 'none'; 
    successMsg.style.display = 'none'; 
}

function showSuccess(message) { 
    successMsg.textContent = message; 
    successMsg.style.display = 'block'; 
    errorMsg.style.display = 'none'; 
}

// ────────────────────────────────────────────────
// Background particles animation (same as signup)
// ────────────────────────────────────────────────

function createParticle() {
  const particle = document.createElement('div');
  particle.className = 'particle';
  
  const size = Math.random() * 6 + 4;
  particle.style.width = `${size}px`;
  particle.style.height = `${size}px`;
  
  particle.style.left = Math.random() * 100 + 'vw';
  particle.style.animationDuration = Math.random() * 10 + 15 + 's';
  particle.style.animationDelay = Math.random() * 5 + 's';
  
  document.getElementById('particles').appendChild(particle);
  
  setTimeout(() => particle.remove(), 20000);
}

for (let i = 0; i < 25; i++) {
  createParticle();
}

setInterval(createParticle, 1200);
</script>

</body>
</html>
