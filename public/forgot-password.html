<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUVA - Forgot Password</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font: 16px Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: #fff;
    flex-direction: column;
  }

  .nuva-logo {
    position: relative;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: conic-gradient(from 200deg,#6ad7ff,#5b9cff 90deg,#9b6aff);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .nuva-logo:after {
    content: "";
    position: absolute;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.7), transparent);
    transform: translateY(8px);
    opacity: 0.15;
  }
  .grid {
    position: absolute;
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 6px;
    justify-items: center;
    align-items: center;
    opacity: 0.25;
  }
  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: linear-gradient(180deg,#fff,#cfe8ff);
  }
  .dot.center {
    transform: scale(1.5);
    background: linear-gradient(180deg,#6a11cb,#2575fc);
  }
  .nuva-text {
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 1px;
    color: #fff;
    z-index: 1;
  }

  .form-box {
    text-align: center;
    max-width: 400px;
    width: 100%;
  }

  .logo {
    font-size: 64px;
    font-weight: bold;
    letter-spacing: 2px;
    margin-bottom: 10px;
    text-shadow: 0 0 12px rgba(0,0,0,0.5);
  }
  .tagline {
    font-size: 18px;
    margin-bottom: 30px;
    font-style: italic;
    color: #e0e0e0;
  }

  input {
    width: 100%;
    padding: 14px;
    margin-bottom: 18px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    background: rgba(255,255,255,0.9);
    color: #000;
  }
  input:focus {
    outline: none;
    box-shadow: 0 0 6px #00e6e6;
  }

  button {
    width: 50%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #fe4f04, #ff7a2d);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }
  button:hover {
    background: linear-gradient(90deg, #0033cc, #001a80);
  }
</style>
</head>
<body>

<div class="nuva-logo">
  <div class="grid">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot center"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <div class="nuva-text">NUVA</div>
</div>

<div class="form-box">
  <div class="logo">NUVA</div>
  <div class="tagline">Forgot Password</div>

  <form action="/forgot-password" method="POST">
    <input type="text" name="recovery_email" placeholder="Phone number or email" required>
    <button type="submit">Submit</button>
  </form>
</div>

</body>
</html>
