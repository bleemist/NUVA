<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUVA - Email Verified</title>
    <style>
        :root {
            --primary: #fe4f04;
            --primary-light: #ff7a2d;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: rgba(15, 23, 42, 0.72);
            --card-border: rgba(254, 79, 4, 0.18);
            --success: #34d399;
        }
        
        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }
        
        .particle {
            position: absolute;
            background: rgba(254, 79, 4, 0.3);
            border-radius: 50%;
            animation: float linear infinite;
            box-shadow: 0 0 12px rgba(254, 79, 4, 0.5);
        }
        
        @keyframes float {
            0%   { transform: translateY(100vh) scale(0.5); opacity: 0; }
            10%  { opacity: 0.7; }
            90%  { opacity: 0.7; }
            100% { transform: translateY(-20vh) scale(1.1); opacity: 0; }
        }
        
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            border: 1px solid var(--card-border);
            padding: 3rem;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(52, 211, 153, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            border: 2px solid var(--success);
        }
        
        .success-icon svg {
            width: 40px;
            height: 40px;
            fill: var(--success);
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            margin: 0.5rem;
        }
        
        .btn.secondary {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--card-border);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(254, 79, 4, 0.4);
        }
        
        .user-info {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 1.5rem;
            margin: 2rem 0;
            border-left: 4px solid var(--success);
        }
        
        .logo {
            margin-bottom: 2rem;
        }
        
        .nuva-logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: conic-gradient(from 200deg, #fe4f04, #ff7a2d 90deg, #9b6aff);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-family: 'Poppins', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .grid {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            justify-items: center;
            align-items: center;
            opacity: 0.25;
            padding: 10px;
        }
        
        .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: linear-gradient(180deg, #fff, #cfe8ff);
        }
        
        .dot.center {
            transform: scale(1.4);
            background: linear-gradient(180deg, #fe4f04, #ff7a2d);
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="card">
        <div class="logo">
            <div class="nuva-logo">
                NUVA
                <div class="grid">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                    <div class="dot"></div><div class="dot center"></div><div class="dot"></div>
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            </div>
        </div>
        
        <div class="success-icon">
            <svg viewBox="0 0 24 24">
                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
            </svg>
        </div>
        
        <h1>Email Verified Successfully!</h1>
        <p>Your email has been verified. You can now access all NUVA features.</p>
        
        <div class="user-info" id="userInfo"></div>
        
        <div>
            <a href="dashboard.html" class="btn">Go to Dashboard</a>
            <a href="course-input.html" class="btn secondary">Find Courses</a>
        </div>
        
        <p style="margin-top: 2rem; font-size: 0.9rem;">
            <a href="login.html" style="color: var(--primary-light);">Sign in with another account</a>
        </p>
    </div>

    <script>
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 6 + 4;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDuration = Math.random() * 10 + 15 + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            document.getElementById('particles').appendChild(particle);
            setTimeout(() => particle.remove(), 20000);
        }
        
        for (let i = 0; i < 15; i++) createParticle();
        setInterval(createParticle, 1000);

        // Get user data from URL
        const urlParams = new URLSearchParams(window.location.search);
        const userDataBase64 = urlParams.get('user');
        
        if (userDataBase64) {
            try {
                const userData = JSON.parse(atob(userDataBase64));
                document.getElementById('userInfo').innerHTML = `
                    <strong>Welcome, ${userData.firstName || 'Student'}!</strong><br>
                    <span style="color: var(--text-muted);">${userData.email}</span>
                `;
                
                // Store in session for auto-login
                sessionStorage.setItem('currentUser', JSON.stringify(userData));
            } catch (e) {
                console.error('Failed to parse user data');
            }
        }
    </script>
</body>
</html>
