<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUVA - Verification Failed</title>
    <style>
        :root {
            --primary: #fe4f04;
            --primary-light: #ff7a2d;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --error: #f87171;
        }
        
        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        
        .card {
            background: rgba(15, 23, 42, 0.72);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            border: 1px solid rgba(254, 79, 4, 0.18);
            padding: 3rem;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        .error-icon {
            width: 80px;
            height: 80px;
            background: rgba(248, 113, 113, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            border: 2px solid var(--error);
        }
        
        .error-icon svg {
            width: 40px;
            height: 40px;
            fill: var(--error);
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, var(--error), #fca5a5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            margin: 0.5rem;
        }
        
        .btn.secondary {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--card-border);
        }
        
        .btn:hover {
            transform: translateY(-3px);
        }
        
        #reasonMessage {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid var(--error);
            border-radius: 8px;
            padding: 1rem;
            margin: 1.5rem 0;
            color: var(--error);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="error-icon">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
            </svg>
        </div>
        
        <h1>Verification Failed</h1>
        <p>We couldn't verify your email address.</p>
        
        <div id="reasonMessage"></div>
        
        <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
            <a href="javascript:history.back()" class="btn secondary">Go Back</a>
            <a href="login.html" class="btn">Return to Login</a>
        </div>
        
        <p style="margin-top: 2rem; font-size: 0.9rem;">
            Need help? <a href="mailto:bleemistorg@gmail.com" style="color: var(--primary-light);">Contact Support</a>
        </p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const reason = urlParams.get('reason');
        const messageEl = document.getElementById('reasonMessage');
        
        const messages = {
            'missing-token': 'No verification token provided. Please use the link from your email.',
            'invalid-token': 'The verification link is invalid or has already been used.',
            'expired': 'This verification link has expired. Please request a new one.',
            'user-not-found': 'User account not found. Please sign up again.',
            'default': 'An unknown error occurred. Please try again or contact support.'
        };
        
        messageEl.textContent = messages[reason] || messages.default;
    </script>
</body>
</html>
