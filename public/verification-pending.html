<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NUVA - Verify Your Email</title>
  <style>
    :root {
      --primary: #fe4f04;
      --primary-light: #ff7a2d;
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --card-bg: rgba(15, 23, 42, 0.72);
      --card-border: rgba(254, 79, 4, 0.18);
      --warning: #fbbf24;
    }
    
    body {
      min-height: 100vh;
      background: var(--bg-gradient);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 20px;
    }
    
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      border: 1px solid var(--card-border);
      padding: 3rem;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      background: linear-gradient(to right, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    p {
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    
    .email-highlight {
      color: var(--primary-light);
      font-weight: 600;
    }
    
    .btn {
      display: inline-block;
      padding: 1rem 2rem;
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      margin: 0.5rem;
      border: none;
      cursor: pointer;
    }
    
    .btn.secondary {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
    }
    
    .resend-link {
      color: var(--primary-light);
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Verify Your Email</h1>
    <p>We've sent a verification email to:<br>
      <span class="email-highlight" id="userEmail"></span>
    </p>
    <p>Please check your inbox and click the verification link to activate your account.</p>
    
    <div style="margin: 2rem 0;">
      <button class="btn" onclick="checkVerification()">I've Verified My Email</button>
      <button class="btn secondary" onclick="resendEmail()">Resend Email</button>
    </div>
    
    <p style="font-size: 0.9rem;">
      Didn't receive the email? Check your spam folder or<br>
      <a href="#" onclick="reportWrongEmail()" style="color: var(--warning);">report wrong email address</a>
    </p>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email') || sessionStorage.getItem('pendingVerification');
    document.getElementById('userEmail').textContent = email || 'your email';

    async function resendEmail() {
      try {
        const response = await fetch('/resend-verification', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const result = await response.json();
        alert(result.message || 'Verification email resent!');
      } catch (err) {
        alert('Failed to resend email. Please try again.');
      }
    }

    function reportWrongEmail() {
      if (confirm('Report this email as incorrect? Our support team will assist you.')) {
        fetch('/report-wrong-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, reason: 'Wrong email reported from pending page' })
        }).then(() => {
          alert('Thank you for reporting. Support will contact you.');
          window.location.href = 'index.html';
        });
      }
    }

    function checkVerification() {
      // This would ideally check with the server
      // For now, redirect to login
      window.location.href = 'login.html?verified=pending';
    }
  </script>
</body>
</html>
