<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUVA - Course Recommendations</title>
<style>
  body { 
    font-family: Arial, sans-serif; 
    background: #f4f6f8; 
    margin: 0; 
    min-height: 100vh; 
    display: flex; 
    flex-direction: column; 
  }
  header { 
    background: linear-gradient(135deg, #1e3c72, #2a5298); 
    color: white; 
    padding: 20px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    gap: 15px; 
  }
  .nuva-logo { 
    width: 60px; 
    height: 60px; 
    border-radius: 50%; 
    background: conic-gradient(from 200deg,#6ad7ff,#5b9cff 90deg,#9b6aff); 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-weight: bold; 
    font-size: 18px; 
    position: relative; 
    overflow: hidden; 
  }
  main { 
    flex: 1; 
    max-width: 1000px; 
    margin: 40px auto; 
    padding: 20px; 
    background: white; 
    border-radius: 12px; 
    box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
    width: 90%; 
  }
  h2 { 
    text-align: center; 
    color: #1e3c72; 
    margin-bottom: 20px; 
  }
  .filter-notice {
    text-align: center;
    margin-bottom: 20px;
    padding: 10px;
    background: #e8f4fd;
    border-radius: 8px;
    color: #1e3c72;
    font-weight: 500;
  }
  .weight-summary { 
    background: #e8f4fd; 
    padding: 25px; 
    border-radius: 10px; 
    margin-bottom: 30px; 
    border-left: 5px solid #1e3c72; 
  }
  .weight-item { 
    display: flex; 
    justify-content: space-between; 
    margin: 10px 0; 
    padding: 8px 0; 
    border-bottom: 1px solid #d1e7f7; 
  }
  .principal-detail { 
    margin-left: 25px; 
    font-size: 0.95em; 
    color: #495057; 
  }
  .total-weight { 
    border-top: 2px solid #1e3c72; 
    padding-top: 15px; 
    margin-top: 15px; 
    font-size: 1.2em; 
    font-weight: bold; 
  }
  .student-info { 
    background: #f8f9fa; 
    padding: 15px; 
    border-radius: 8px; 
    margin-bottom: 25px; 
    font-size: 0.95em; 
  }
  .result-card { 
    border: 1px solid #ddd; 
    border-radius: 10px; 
    padding: 20px; 
    margin-bottom: 20px; 
    background: #f9f9f9; 
    position: relative; 
    transition: all 0.2s; 
  }
  .result-card:hover { 
    transform: translateY(-3px); 
    box-shadow: 0 6px 18px rgba(0,0,0,0.08); 
  }
  .match-score { 
    position: absolute; 
    top: 15px; 
    right: 15px; 
    padding: 6px 12px; 
    border-radius: 20px; 
    font-weight: bold; 
    font-size: 13px; 
  }
  .high { background: #28a745; color: white; }
  .medium { background: #ffc107; color: #212529; }
  .low { background: #dc3545; color: white; }
  .eligibility-badge { 
    padding: 4px 10px; 
    border-radius: 12px; 
    font-size: 12px; 
    font-weight: bold; 
  }
  .eligible { background: #d4edda; color: #155724; }
  .not-eligible { background: #f8d7da; color: #721c24; }
  .top-recommendation { 
    background: #d4edda; 
    padding: 12px; 
    border-radius: 6px; 
    margin-top: 15px; 
    border-left: 4px solid #28a745; 
    font-weight: 500; 
  }
  .no-results, .loading-state { 
    text-align: center; 
    padding: 60px 20px; 
    color: #6c757d; 
  }
  .action-buttons { 
    display: flex; 
    gap: 15px; 
    justify-content: center; 
    margin-top: 40px; 
    flex-wrap: wrap; 
  }
  .btn { 
    padding: 12px 28px; 
    border: none; 
    border-radius: 6px; 
    font-size: 16px; 
    font-weight: bold; 
    cursor: pointer; 
    transition: all 0.3s; 
  }
  .btn-primary { 
    background: linear-gradient(90deg, #fe4f04, #ff7a2d); 
    color: white; 
  }
  .btn-primary:hover { 
    background: linear-gradient(90deg, #e03e00, #e06600); 
    transform: translateY(-2px); 
  }
  .btn-secondary { 
    background: #6c757d; 
    color: white; 
  }
  .btn-secondary:hover { 
    background: #5a6268; 
    transform: translateY(-2px); 
  }
  .sort-controls { 
    margin: 20px 0; 
    text-align: center; 
  }
  .sort-controls select { 
    padding: 8px 16px; 
    font-size: 16px; 
    border-radius: 6px; 
    border: 1px solid #ccc; 
  }
  footer { 
    background: #1e3c72; 
    color: white; 
    text-align: center; 
    padding: 20px; 
    margin-top: auto; 
  }
</style>
</head>
<body>

<header>
  <div class="nuva-logo">NUVA</div>
  <h1>NUVA - Course Recommendations</h1>
</header>

<main>
  <h2>Your Personalized Course Recommendations</h2>

  <div id="filter-notice" class="filter-notice" style="display:none;"></div>

  <div id="status-area" class="loading-state"></div>

  <div id="student-info" class="student-info" style="display:none;"></div>

  <div id="weight-summary" class="weight-summary" style="display:none;">
    <h3>Your Calculated Weight Breakdown</h3>
    <div id="weight-details"></div>
  </div>

  <div class="sort-controls" id="sort-controls" style="display:none;">
    <label style="margin-right: 12px; font-weight: bold;">Sort by:</label>
    <select id="sortSelect">
      <option value="weight">Calculated Weight (recommended)</option>
      <option value="match">Match Score (highest first)</option>
    </select>
  </div>

  <div id="results-info" style="text-align:center; margin:20px 0; color:#495057; font-style:italic;"></div>

  <div id="results-container"></div>

  <div class="action-buttons">
    <button class="btn btn-primary" onclick="window.location.href='course-input.html'">Try New Combination</button>
    <button class="btn btn-secondary" onclick="window.location.href='dashboard.html'">Back to Dashboard</button>
  </div>
</main>

<footer>
  © 2025 BLEEMIST COMPANIES. All rights reserved under <strong>MUYANJA ANDREW</strong>.<br>
  Contact: <a href="mailto:bleemistorg@gmail.com" style="color:#ffd966;">NUVA Org | Email and Consultation Center</a>
</footer>

<script>
// ────────────────────────────────────────────────
// Data from sessionStorage
// ────────────────────────────────────────────────
const recommendations   = JSON.parse(sessionStorage.getItem('courseRecommendations') || '[]');
const weights           = JSON.parse(sessionStorage.getItem('weights') || '{}');
const submissionData    = JSON.parse(sessionStorage.getItem('submissionData') || '{}');
const totalCourses      = sessionStorage.getItem('totalCourses') || '0';
const usedSubjects      = JSON.parse(sessionStorage.getItem('principalSubjectsUsed') || '[]');
const usedGrades        = JSON.parse(sessionStorage.getItem('principalGradesUsed') || '[]');

const statusArea        = document.getElementById('status-area');
const filterNotice      = document.getElementById('filter-notice');
const studentInfo       = document.getElementById('student-info');
const weightSummary     = document.getElementById('weight-summary');
const weightDetails     = document.getElementById('weight-details');
const sortControls      = document.getElementById('sort-controls');
const resultsInfo       = document.getElementById('results-info');
const resultsContainer  = document.getElementById('results-container');

// Current sort mode
let currentSort = 'weight'; // 'weight' or 'match'

// ────────────────────────────────────────────────
// Status message helper
// ────────────────────────────────────────────────
function showStatus(message, type = 'info') {
  const colors = { info: '#1e3c72', error: '#dc3545', success: '#28a745' };
  statusArea.innerHTML = `
    <div style="padding:25px; background:#f8f9fa; border-left:6px solid ${colors[type]}; border-radius:8px;">
      <strong style="color:${colors[type]}">${type.toUpperCase()}:</strong><br>${message}
    </div>`;
}

// ────────────────────────────────────────────────
// Check if data exists
// ────────────────────────────────────────────────
if (recommendations.length === 0 && Object.keys(weights).length === 0) {
  showStatus(`
    No recommendation data available.<br><br>
    <strong>Possible causes:</strong><br>
    • Page was refreshed or opened directly<br>
    • Previous submission failed or was incomplete<br>
    • No valid response was saved<br><br>
    <strong>Next step:</strong> Go back and submit your subjects again.
  `, 'error');
} else {
  statusArea.style.display = 'none';
  weightSummary.style.display = 'block';
  sortControls.style.display = 'block';
  if (recommendations.length > 0) resultsInfo.style.display = 'block';
}

// ────────────────────────────────────────────────
// Show university filter notice
// ────────────────────────────────────────────────
function showFilterNotice() {
  if (submissionData.selectedUniversity && submissionData.selectedUniversity.trim() !== '') {
    filterNotice.textContent = `Showing courses only from: ${submissionData.selectedUniversity}`;
    filterNotice.style.display = 'block';
  } else {
    filterNotice.textContent = 'Showing courses from all universities';
    filterNotice.style.display = 'block';
  }
}

// ────────────────────────────────────────────────
// Display student profile summary
// ────────────────────────────────────────────────
function displayStudentInfo() {
  if (Object.keys(submissionData).length === 0) return;

  studentInfo.innerHTML = `
    <strong>Your Profile:</strong><br>
    Gender: <strong>${submissionData.gender === 'female' ? 'Female (+1.5 bonus)' : 'Male'}</strong> •
    Level: <strong>${submissionData.level}</strong> •
    O-Level Weight: <strong>${submissionData.oLevelWeight || 0}</strong> •
    Subsidiary/General Paper: <strong>${submissionData.subsidiaryGrade === '1' ? 'Pass (+1 pt)' : 'None'}</strong>
  `;
  studentInfo.style.display = 'block';
}

// ────────────────────────────────────────────────
// Weight breakdown display - UPDATED to match new server
// ────────────────────────────────────────────────
function displayWeightSummary() {
  if (Object.keys(weights).length === 0) {
    weightDetails.innerHTML = '<p style="color:#6c757d; font-style:italic;">No detailed weight information available.</p>';
    return;
  }

  let html = `
    <div class="weight-item">
      <span>O-Level Weight</span><strong>${weights.oLevel || 0}</strong>
    </div>`;

  if (weights.genderBonus) {
    html += `
      <div class="weight-item">
        <span>Gender Bonus (Female)</span><strong>+${weights.genderBonus}</strong>
      </div>`;
  }

  html += `
    <div class="weight-item">
      <span>Subsidiary / General Paper</span><strong>${weights.subsidiary || 0}</strong>
    </div>`;

  if (weights.principalSubjects?.length > 0) {
    html += `<div class="weight-item"><strong>Principal Subjects (Top 3 only):</strong></div>`;
    weights.principalSubjects.forEach(s => {
      html += `
        <div class="principal-detail">
          ${s.subject} (${s.grade}) → ${s.points} pts ×${s.multiplier} (${s.category || 'Relevant'}) = <strong>${s.weightedPoints}</strong>
        </div>`;
    });

    // Show the three categories from the new server
    html += `
      <div class="weight-item" style="margin-top:12px;">
        <span>Essential subjects total (×3)</span><strong>${weights.essentialTotal || 0}</strong>
      </div>`;
      
    if (weights.relevantTotal !== undefined) {
      html += `
        <div class="weight-item">
          <span>Relevant subjects total (×2)</span><strong>${weights.relevantTotal || 0}</strong>
        </div>`;
    } else {
      html += `
        <div class="weight-item">
          <span>Other subjects total (×2)</span><strong>${weights.otherTotal || 0}</strong>
        </div>`;
    }
    
    if (weights.desirableTotal !== undefined) {
      html += `
        <div class="weight-item">
          <span>Desirable subjects total (×1)</span><strong>${weights.desirableTotal || 0}</strong>
        </div>`;
    }
  }

  html += `
    <div class="total-weight">
      <span>Total Calculated Weight</span><span style="color:#1e3c72; font-size:1.3em;">${weights.total || 0}</span>
    </div>`;

  weightDetails.innerHTML = html;
}

// ────────────────────────────────────────────────
// Get sorted list of recommendations
// ────────────────────────────────────────────────
function getSortedRecommendations() {
  let sorted = [...recommendations];

  if (currentSort === 'match') {
    sorted.sort((a, b) => b.matchScore - a.matchScore);
  } else {
    sorted.sort((a, b) => b.yourWeight - a.yourWeight);
  }

  return sorted;
}

// ────────────────────────────────────────────────
// Match score styling helper
// ────────────────────────────────────────────────
function getMatchScoreClass(score) {
  if (score >= 80) return 'high';
  if (score >= 60) return 'medium';
  return 'low';
}

// ────────────────────────────────────────────────
// Render recommendation cards
// ────────────────────────────────────────────────
function displayRecommendations() {
  if (recommendations.length === 0) {
    let msg = `
      <div class="no-results">
        <h3>No Matching Courses Found</h3>
        <p>Your current weight is below all available cut-off points or your subject combination doesn't meet any course requirements.</p>
    `;

    if (submissionData.selectedUniversity && submissionData.selectedUniversity.trim() !== '') {
      msg += `<p><strong>Note:</strong> You selected <em>${submissionData.selectedUniversity}</em>. No courses from this university match your profile.</p>`;
    }

    msg += `<p>Try adjusting your subjects, improving grades, or selecting "Any University".</p></div>`;

    resultsContainer.innerHTML = msg;
    return;
  }

  const sorted = getSortedRecommendations();

  resultsInfo.innerHTML = `
    Found <strong>${totalCourses}</strong> eligible courses • 
    Showing top <strong>${Math.min(sorted.length, 15)}</strong> matches • 
    Sorted by: <strong>${currentSort === 'match' ? 'Match Score' : 'Calculated Weight'}</strong>
  `;

  let html = '';

  sorted.forEach((course, index) => {
    const isEligible = course.yourWeight >= course.cutOff;
    const matchClass = getMatchScoreClass(course.matchScore);

    html += `
      <div class="result-card">
        <span class="match-score ${matchClass}">${course.matchScore}% Match</span>
        <h3>${course.name}</h3>

        <div style="display:flex; justify-content:space-between; margin:15px 0;">
          <div><strong>University:</strong> ${course.university}</div>
          <div><strong>Code:</strong> ${course.code}</div>
        </div>

        <div style="display:flex; justify-content:space-between; margin:15px 0; font-size:1.1em;">
          <div>Cut-off: <strong>${course.cutOff}</strong></div>
          <div>Your weight: <strong style="color:${isEligible ? '#28a745' : '#dc3545'}">${course.yourWeight}</strong></div>
        </div>

        <p>
          <strong>Status:</strong>
          <span class="eligibility-badge ${isEligible ? 'eligible' : 'not-eligible'}">
            ${isEligible ? 'ELIGIBLE' : 'BELOW CUT-OFF'}
          </span>
        </p>

        <div style="display:flex; gap:20px; margin:15px 0; flex-wrap:wrap;">
          <div><strong>Faculty:</strong> ${course.faculty}</div>
          <div><strong>Duration:</strong> ${course.duration}</div>
          <div><strong>Type:</strong> ${course.programType}</div>
        </div>

        ${isEligible && index < 3 ? `<div class="top-recommendation">★ Highly Recommended Match</div>` : ''}

      </div>`;
  });

  resultsContainer.innerHTML = html;
}

// ────────────────────────────────────────────────
// Sort selector listener
// ────────────────────────────────────────────────
document.getElementById('sortSelect')?.addEventListener('change', function(e) {
  currentSort = e.target.value;
  displayRecommendations();
});

// ────────────────────────────────────────────────
// Initialize everything
// ────────────────────────────────────────────────
function initializePage() {
  showFilterNotice();
  displayStudentInfo();
  displayWeightSummary();
  displayRecommendations();
}

document.addEventListener('DOMContentLoaded', initializePage);
</script>
</body>
</html>
