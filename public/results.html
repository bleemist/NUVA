<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NUVA - Course Recommendations</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #fe4f04;
      --primary-dark: #e03e00;
      --primary-light: #ff7a2d;
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --card-bg: rgba(15, 23, 42, 0.72);
      --card-border: rgba(254, 79, 4, 0.18);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --sidebar-bg: rgba(15, 23, 42, 0.85);
      --success: #34d399;
      --warning: #fbbf24;
      --error: #f87171;
      --info-bg: rgba(30, 60, 114, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: var(--bg-gradient);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* Particles Background */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .particle {
      position: absolute;
      background: rgba(254, 79, 4, 0.2);
      border-radius: 50%;
      animation: float linear infinite;
      box-shadow: 0 0 15px rgba(254, 79, 4, 0.3);
    }

    @keyframes float {
      0%   { transform: translateY(100vh) scale(0.5); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
    }

    /* Sticky Header */
    .header {
      position: sticky;
      top: 0;
      background: var(--sidebar-bg);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--card-border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .nuva-logo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: conic-gradient(from 200deg, #fe4f04, #ff7a2d 90deg, #9b6aff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: white;
      box-shadow: 0 4px 15px rgba(254, 79, 4, 0.25);
      position: relative;
      overflow: hidden;
      animation: pulseGlow 4s infinite ease-in-out;
    }

    .nuva-logo::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.3) 50%, transparent 60%);
      animation: shine 6s infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 4px 15px rgba(254, 79, 4, 0.25); }
      50%      { box-shadow: 0 8px 25px rgba(254, 79, 4, 0.45); }
    }

    @keyframes shine {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(120%); }
    }

    .grid {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      justify-items: center;
      align-items: center;
      opacity: 0.25;
      padding: 12px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: linear-gradient(180deg, #fff, #cfe8ff);
    }

    .dot.center {
      transform: scale(1.5);
      background: linear-gradient(180deg, #fe4f04, #ff7a2d);
    }

    .header-logo h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.5rem;
      background: linear-gradient(to right, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .nav-links {
      display: flex;
      gap: 0.5rem;
    }

    .nav-link {
      display: flex;
      align-items: center;
      padding: 0.6rem 1.2rem;
      color: var(--text-muted);
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: all 0.25s ease;
      white-space: nowrap;
    }

    .nav-link:hover, .nav-link.active {
      background: rgba(254, 79, 4, 0.12);
      color: white;
    }

    .nav-link svg {
      width: 18px;
      height: 18px;
      margin-right: 6px;
      fill: currentColor;
    }

    .nav-link.active {
      color: var(--primary-light);
      background: rgba(254, 79, 4, 0.08);
    }

    .container {
      flex: 1;
      padding: 2rem;
      position: relative;
      z-index: 10;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    /* Filter Notice */
    .filter-notice {
      background: rgba(254, 79, 4, 0.08);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
      text-align: center;
      color: var(--primary-light);
      font-weight: 500;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .filter-notice svg {
      width: 20px;
      height: 20px;
      fill: var(--primary);
    }

    /* Weight Summary Card */
    .weight-summary {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      border: 1px solid var(--card-border);
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .weight-summary h2 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      background: linear-gradient(to right, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .student-info {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      border: 1px solid var(--card-border);
    }

    .student-info h3 {
      color: var(--primary-light);
      margin-bottom: 1rem;
      font-size: 1.2rem;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }

    .info-item {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .info-label {
      color: var(--text-muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-value {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--primary-light);
    }

    .weight-breakdown {
      margin-top: 1.5rem;
    }

    .weight-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .weight-item:last-child {
      border-bottom: none;
    }

    .weight-label {
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .weight-label svg {
      width: 16px;
      height: 16px;
      fill: var(--text-muted);
    }

    .weight-value {
      font-weight: 600;
      color: white;
    }

    .subject-breakdown {
      margin: 1rem 0 1.5rem;
      padding-left: 1.5rem;
      border-left: 2px solid var(--primary);
    }

    .subject-item {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    .subject-item.essential {
      color: var(--success);
    }

    .subject-item .subject-name {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .essential-badge {
      background: rgba(52, 211, 153, 0.15);
      color: var(--success);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .total-weight {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 2px solid var(--primary);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.3rem;
    }

    .total-weight .weight-value {
      font-size: 2rem;
      color: var(--primary-light);
    }

    .calculation-explanation {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 12px;
      padding: 1.2rem;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
      border: 1px dashed var(--card-border);
    }

    .calculation-explanation h4 {
      color: var(--primary-light);
      margin-bottom: 0.8rem;
      font-size: 1rem;
    }

    .calc-step {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0.5rem 0;
    }

    .calc-step::before {
      content: "✓";
      color: var(--success);
      font-weight: bold;
    }

    /* Recommendations Section */
    .recommendations {
      margin-top: 2rem;
    }

    .results-info {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 12px;
      font-size: 1rem;
    }

    .results-info strong {
      color: var(--primary-light);
    }

    .result-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border-radius: 20px;
      border: 1px solid var(--card-border);
      padding: 2rem;
      margin-bottom: 1.5rem;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .result-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 50px rgba(254, 79, 4, 0.2);
    }

    .match-score-badge {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      padding: 0.5rem 1rem;
      border-radius: 30px;
      font-weight: 700;
      font-size: 0.9rem;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
    }

    .match-score-badge.high {
      background: rgba(52, 211, 153, 0.2);
      color: var(--success);
      border-color: var(--success);
    }

    .match-score-badge.medium {
      background: rgba(251, 191, 36, 0.2);
      color: var(--warning);
      border-color: var(--warning);
    }

    .match-score-badge.low {
      background: rgba(248, 113, 113, 0.2);
      color: var(--error);
      border-color: var(--error);
    }

    .course-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.5rem;
      padding-right: 100px;
    }

    .course-header h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.4rem;
      color: white;
      margin-bottom: 0.5rem;
    }

    .course-meta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .meta-tag {
      background: rgba(255, 255, 255, 0.05);
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .meta-tag svg {
      width: 14px;
      height: 14px;
      fill: var(--text-muted);
    }

    .comparison-box {
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 16px;
      padding: 1.5rem;
      margin: 1.5rem 0;
      border: 1px solid var(--card-border);
    }

    .comparison-item {
      text-align: center;
    }

    .comparison-label {
      color: var(--text-muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }

    .comparison-value {
      font-size: 2rem;
      font-weight: 700;
    }

    .comparison-value.cutoff {
      color: var(--warning);
    }

    .comparison-value.your-weight {
      color: var(--primary-light);
    }

    .comparison-vs {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .eligibility-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1.2rem;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .eligibility-badge.eligible {
      background: rgba(52, 211, 153, 0.15);
      color: var(--success);
      border: 1px solid var(--success);
    }

    .eligibility-badge.not-eligible {
      background: rgba(248, 113, 113, 0.15);
      color: var(--error);
      border: 1px solid var(--error);
    }

    .subject-section {
      margin: 1.5rem 0;
    }

    .subject-section h4 {
      color: var(--primary-light);
      margin-bottom: 1rem;
      font-size: 1rem;
    }

    .subject-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .subject-tag {
      background: rgba(255, 255, 255, 0.05);
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .subject-tag.essential {
      background: rgba(52, 211, 153, 0.1);
      color: var(--success);
      border: 1px solid var(--success);
      font-weight: 500;
    }

    .top-recommendation {
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-weight: 600;
    }

    .top-recommendation svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .no-results {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      border: 1px solid var(--card-border);
      padding: 3rem 2rem;
      text-align: center;
    }

    .no-results h3 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      color: var(--primary-light);
    }

    .no-results p {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .no-results ul {
      list-style: none;
      display: inline-block;
      text-align: left;
      margin: 1.5rem 0;
    }

    .no-results li {
      margin: 0.8rem 0;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .no-results li::before {
      content: "•";
      color: var(--primary);
      font-weight: bold;
      font-size: 1.2rem;
    }

    .ranking-explanation {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 16px;
      padding: 2rem;
      margin-top: 2rem;
      text-align: center;
    }

    .ranking-explanation h4 {
      color: var(--primary-light);
      margin-bottom: 1.5rem;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 50%;
    }

    .legend-color.high { background: var(--success); }
    .legend-color.medium { background: var(--warning); }
    .legend-color.low { background: var(--error); }

    .legend-label {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Admin Link */
    .admin-link {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      padding: 0.8rem 1.2rem;
      border-radius: 50px;
      border: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 0.9rem;
      z-index: 100;
      text-decoration: none;
      transition: all 0.3s ease;
      opacity: 0.7;
    }

    .admin-link:hover {
      opacity: 1;
      transform: translateY(-3px);
      border-color: var(--primary);
      color: var(--primary-light);
    }

    .admin-link svg {
      width: 20px;
      height: 20px;
      fill: var(--primary);
    }

    /* Action Buttons */
    .action-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin: 3rem 0;
      flex-wrap: wrap;
    }

    .btn {
      padding: 1rem 2rem;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .btn-primary {
      background: linear-gradient(90deg, var(--primary), var(--primary-light));
      color: white;
      box-shadow: 0 8px 25px rgba(254, 79, 4, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(254, 79, 4, 0.6);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border: 1px solid var(--card-border);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    footer {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(10px);
      padding: 1.5rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      border-top: 1px solid var(--card-border);
      margin-top: auto;
      z-index: 10;
    }

    footer a {
      color: var(--primary-light);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
      }

      .nav-links {
        width: 100%;
        justify-content: center;
      }

      .container {
        padding: 1rem;
      }

      .course-header {
        flex-direction: column;
        padding-right: 0;
      }

      .match-score-badge {
        position: relative;
        top: 0;
        right: 0;
        display: inline-block;
        margin-bottom: 1rem;
      }

      .comparison-box {
        flex-direction: column;
        gap: 1rem;
      }

      .action-buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }

      .admin-link {
        bottom: 1rem;
        right: 1rem;
        padding: 0.6rem 1rem;
      }
    }
  </style>
</head>
<body>

<!-- Background Particles -->
<div class="particles" id="particles"></div>

<!-- Sticky Header -->
<header class="header">
  <div class="header-logo">
    <div class="nuva-logo">
      NUVA
      <div class="grid">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot center"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
    <h1>Results</h1>
  </div>
  
  <div class="nav-links">
    <a href="index.html" class="nav-link">
      <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
      Dashboard
    </a>
    <a href="course-input.html" class="nav-link">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2z"/></svg>
      Find Courses
    </a>
    <a href="results.html" class="nav-link active">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
      Results
    </a>
  </div>
</header>

<div class="container">
  <!-- Filter Notice -->
  <div class="filter-notice" id="filterNotice">
    <svg viewBox="0 0 24 24"><path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></svg>
    <span id="filterNoticeText">Loading filter information...</span>
  </div>

  <!-- Weight Summary Card -->
  <div class="weight-summary">
    <h2>Your Academic Profile</h2>
    
    <!-- Student Information -->
    <div class="student-info" id="studentInfo"></div>

    <h2 style="margin-top: 2rem;">Weight Calculation Breakdown</h2>
    
    <!-- Weight Details -->
    <div class="weight-breakdown" id="weightDetails"></div>
  </div>

  <!-- Recommendations Section -->
  <div class="recommendations">
    <!-- Results Info -->
    <div class="results-info" id="resultsInfo"></div>

    <!-- Results Container -->
    <div id="resultsContainer"></div>

    <!-- Action Buttons -->
    <div class="action-buttons">
      <button class="btn btn-primary" onclick="window.location.href='course-input.html'">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Try New Combination
      </button>
      <button class="btn btn-secondary" onclick="window.location.href='index.html'">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Back to Dashboard
      </button>
    </div>
  </div>
</div>

<!-- Admin Quick Link -->
<a href="admin.html" class="admin-link" title="Admin Panel">
  <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
  Admin
</a>

  Contact: <a href="mailto:bleemistorg@gmail.com">NUVA Org | Email and Consultation Center</a>
</footer>

<script>
// ==================== DATA RETRIEVAL ====================
let recommendations = JSON.parse(sessionStorage.getItem('courseRecommendations') || '[]');
let calculatedWeights = JSON.parse(sessionStorage.getItem('weights') || '{}');
let principalSubjectsUsed = JSON.parse(sessionStorage.getItem('principalSubjectsUsed') || '[]');
let principalGradesUsed = JSON.parse(sessionStorage.getItem('principalGradesUsed') || '[]');
let submissionData = JSON.parse(sessionStorage.getItem('submissionData') || '{}');
let totalCourses = sessionStorage.getItem('totalCourses') || '0';

// DOM Elements
const filterNotice = document.getElementById('filterNotice');
const filterNoticeText = document.getElementById('filterNoticeText');
const studentInfo = document.getElementById('studentInfo');
const weightDetails = document.getElementById('weightDetails');
const resultsInfo = document.getElementById('resultsInfo');
const resultsContainer = document.getElementById('resultsContainer');

// ==================== PARTICLES BACKGROUND ====================
function createParticle() {
  const particles = document.getElementById('particles');
  const particle = document.createElement('div');
  particle.className = 'particle';
  
  const size = Math.random() * 8 + 4;
  particle.style.width = `${size}px`;
  particle.style.height = `${size}px`;
  particle.style.left = Math.random() * 100 + 'vw';
  particle.style.animationDuration = Math.random() * 10 + 15 + 's';
  particle.style.animationDelay = Math.random() * 5 + 's';
  
  particles.appendChild(particle);
  setTimeout(() => particle.remove(), 20000);
}

// Initialize particles
for (let i = 0; i < 20; i++) createParticle();
setInterval(createParticle, 1000);

// ==================== FILTER NOTICE ====================
function showFilterNotice() {
  if (submissionData.selectedUniversity && submissionData.selectedUniversity.trim() !== '') {
    filterNoticeText.textContent = `Showing courses only from: ${submissionData.selectedUniversity}`;
    filterNotice.style.display = 'flex';
  } else {
    filterNoticeText.textContent = 'Showing courses from all universities';
    filterNotice.style.display = 'flex';
  }
}

// ==================== STUDENT INFORMATION ====================
function displayStudentInfo() {
  if (!submissionData || Object.keys(submissionData).length === 0) {
    studentInfo.innerHTML = '<p style="color: var(--text-muted);">No student information available.</p>';
    return;
  }

  let html = `
    <h3>Personal Information</h3>
    <div class="info-grid">
      <div class="info-item">
        <span class="info-label">Gender</span>
        <span class="info-value">${submissionData.gender ? submissionData.gender.charAt(0).toUpperCase() + submissionData.gender.slice(1) : 'Not specified'}</span>
      </div>
      <div class="info-item">
        <span class="info-label">Education Level</span>
        <span class="info-value">${submissionData.level || 'Not specified'}</span>
      </div>
      <div class="info-item">
        <span class="info-label">O-Level Weight</span>
        <span class="info-value">${submissionData.oLevelWeight || 0}</span>
      </div>
      <div class="info-item">
        <span class="info-label">Subsidiary</span>
        <span class="info-value">${submissionData.subsidiaryGrade === '1' ? 'Passed (+1 pt)' : 'None'}</span>
      </div>
    </div>
  `;

  if (principalSubjectsUsed.length > 0) {
    html += `
      <h3 style="margin-top: 1.5rem;">Principal Subjects</h3>
      <div class="info-grid">
        ${principalSubjectsUsed.map((subject, i) => `
          <div class="info-item">
            <span class="info-label">Subject ${i + 1}</span>
            <span class="info-value">${subject} (${principalGradesUsed[i]})</span>
          </div>
        `).join('')}
      </div>
    `;
  }

  studentInfo.innerHTML = html;
}

// ==================== WEIGHT BREAKDOWN ====================
function displayWeightSummary() {
  if (!calculatedWeights || Object.keys(calculatedWeights).length === 0) {
    weightDetails.innerHTML = '<p style="color: var(--text-muted); text-align: center;">No weight calculation data available.</p>';
    return;
  }

  let html = '';

  // Base weights
  html += `
    <div class="weight-item">
      <span class="weight-label">
        <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        O-Level Weight
      </span>
      <span class="weight-value">${calculatedWeights.oLevel || 0}</span>
    </div>
  `;

  if (calculatedWeights.genderBonus) {
    html += `
      <div class="weight-item">
        <span class="weight-label">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          Gender Bonus (Female)
        </span>
        <span class="weight-value">+${calculatedWeights.genderBonus}</span>
      </div>
    `;
  }

  html += `
    <div class="weight-item">
      <span class="weight-label">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
        Subsidiary/General Paper
      </span>
      <span class="weight-value">${calculatedWeights.subsidiary || 0}</span>
    </div>
  `;

  // Principal subjects breakdown
  if (calculatedWeights.principalSubjects && calculatedWeights.principalSubjects.length > 0) {
    html += `<h3 style="margin: 1.5rem 0 1rem;">Principal Subjects</h3>`;
    html += `<div class="subject-breakdown">`;

    calculatedWeights.principalSubjects.forEach(subject => {
      const isEssential = subject.category === 'Essential';
      html += `
        <div class="subject-item ${isEssential ? 'essential' : ''}">
          <span class="subject-name">
            ${subject.subject} (${subject.grade})
            ${isEssential ? '<span class="essential-badge">ESSENTIAL</span>' : ''}
          </span>
          <span>${subject.points} pts ×${subject.multiplier} = ${subject.weightedPoints}</span>
        </div>
      `;
    });

    html += `</div>`;

    // Category totals
    html += `
      <div class="weight-item">
        <span class="weight-label">Essential Subjects Total (×3)</span>
        <span class="weight-value">${calculatedWeights.essentialTotal || 0}</span>
      </div>
      <div class="weight-item">
        <span class="weight-label">Other Subjects Total (×2)</span>
        <span class="weight-value">${calculatedWeights.otherTotal || 0}</span>
      </div>
    `;
  }

  // Total weight
  html += `
    <div class="total-weight">
      <span class="weight-label">Total Calculated Weight</span>
      <span class="weight-value">${calculatedWeights.total || 0}</span>
    </div>
  `;

  // Calculation explanation
  html += `
    <div class="calculation-explanation">
      <h4>How Your Weight is Calculated:</h4>
      <div class="calc-step">Essential Subjects: Grade Points × 3</div>
      <div class="calc-step">Other Principal Subjects: Grade Points × 2</div>
      <div class="calc-step">Subsidiary Subjects: Pass = 1 point</div>
      <div class="calc-step">O-Level Weight: Added directly (0-3)</div>
      <div class="calc-step">Female Bonus: +1.5 points</div>
    </div>
  `;

  weightDetails.innerHTML = html;
}

// ==================== MATCH SCORE HELPER ====================
function getMatchScoreClass(score) {
  if (score >= 80) return 'high';
  if (score >= 60) return 'medium';
  return 'low';
}

// ==================== DISPLAY RECOMMENDATIONS ====================
function displayRecommendations() {
  if (!recommendations || recommendations.length === 0) {
    resultsContainer.innerHTML = `
      <div class="no-results">
        <h3>No Course Recommendations Found</h3>
        <p>We couldn't find any courses that match your current qualifications and subject combination.</p>
        <p>This could be because:</p>
        <ul>
          <li>Your subject combination doesn't meet the requirements for available courses</li>
          <li>Your calculated weight (${calculatedWeights.total || 0}) is below the cut-off points for eligible courses</li>
          <li>There might be an issue with your input data</li>
        </ul>
        <p>Please try adjusting your subject combination or check your input data.</p>
        <div style="margin-top: 2rem;">
          <button class="btn btn-primary" onclick="window.location.href='course-input.html'">
            Try Different Subjects
          </button>
        </div>
      </div>
    `;
    return;
  }

  // Results info
  resultsInfo.innerHTML = `
    Found <strong>${totalCourses}</strong> eligible courses. 
    Showing top <strong>${Math.min(recommendations.length, 15)}</strong> recommendations based on your weight score.
  `;

  let html = '';

  recommendations.slice(0, 15).forEach((course, index) => {
    const isEligible = course.yourWeight >= course.cutOff;
    const matchClass = getMatchScoreClass(course.matchScore);
    const statusText = isEligible ? 'ELIGIBLE' : 'BELOW CUT-OFF';

    html += `
      <div class="result-card">
        <span class="match-score-badge ${matchClass}">${course.matchScore}% Match</span>
        
        <div class="course-header">
          <div>
            <h3>${course.name}</h3>
            <div class="course-meta">
              <span class="meta-tag">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
                ${course.code}
              </span>
              <span class="meta-tag">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                ${course.university}
              </span>
            </div>
          </div>
        </div>

        <div class="comparison-box">
          <div class="comparison-item">
            <div class="comparison-label">Cut-off Points</div>
            <div class="comparison-value cutoff">${course.cutOff}</div>
          </div>
          <div class="comparison-vs">VS</div>
          <div class="comparison-item">
            <div class="comparison-label">Your Weight</div>
            <div class="comparison-value your-weight">${course.yourWeight}</div>
          </div>
        </div>

        <div style="display: flex; justify-content: center; margin: 1rem 0;">
          <span class="eligibility-badge ${isEligible ? 'eligible' : 'not-eligible'}">
            ${isEligible ? '✓' : '✗'} ${statusText}
          </span>
        </div>

        <div style="display: flex; gap: 1.5rem; flex-wrap: wrap; margin: 1.5rem 0; padding: 1rem; background: rgba(255,255,255,0.02); border-radius: 12px;">
          <div><strong>Faculty:</strong> ${course.faculty}</div>
          <div><strong>Duration:</strong> ${course.duration}</div>
          <div><strong>Type:</strong> ${course.programType}</div>
        </div>

        ${course.essentialSubjects && course.essentialSubjects.length > 0 ? `
          <div class="subject-section">
            <h4>Essential Subjects (×3 multiplier)</h4>
            <div class="subject-tags">
              ${course.essentialSubjects.map(subject => 
                `<span class="subject-tag essential">${subject}</span>`
              ).join('')}
            </div>
          </div>
        ` : ''}

        ${course.requiredSubjects && course.requiredSubjects.length > 0 ? `
          <div class="subject-section">
            <h4>Required Subject Areas</h4>
            <div class="subject-tags">
              ${course.requiredSubjects.map(subject => 
                `<span class="subject-tag">${subject}</span>`
              ).join('')}
            </div>
          </div>
        ` : ''}

        ${isEligible && index < 3 ? `
          <div class="top-recommendation">
            <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            Highly Recommended Match - This course strongly aligns with your academic profile!
          </div>
        ` : ''}
      </div>
    `;
  });

  // Ranking explanation
  html += `
    <div class="ranking-explanation">
      <h4>How Courses Are Ranked</h4>
      <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Courses are sorted by your calculated weight score, with higher scores indicating better matches.</p>
      <div class="legend">
        <div class="legend-item">
          <span class="legend-color high"></span>
          <span class="legend-label">High Match (80-100%)</span>
        </div>
        <div class="legend-item">
          <span class="legend-color medium"></span>
          <span class="legend-label">Medium Match (60-79%)</span>
        </div>
        <div class="legend-item">
          <span class="legend-color low"></span>
          <span class="legend-label">Low Match (Below 60%)</span>
        </div>
      </div>
    </div>
  `;

  resultsContainer.innerHTML = html;
}

// ==================== INITIALIZE PAGE ====================
function initializePage() {
  showFilterNotice();
  displayStudentInfo();
  displayWeightSummary();
  displayRecommendations();
}

// Run when page loads
document.addEventListener('DOMContentLoaded', initializePage);
</script>

</body>
